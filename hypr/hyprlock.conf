background {
    monitor =
    path = ~/.config/wallpapers/hyprlockMain.png
    blur_size = 5
    blur_passes = 1
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(255,255,255,0.9)
    font_size = 48
    font_family = JetBrainsMono Nerd Font

    position = 0, 100
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:3600000] date "+%a %b %d"
    color = rgba(255,255,255,0.7)
    font_size = 24
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 320, 55

    outline_thickness = 3
    rounding = 12

    inner_color = rgba(0,0,0,0.4)
    outer_color = rgba(255,255,255,0.4)

    fail_color = rgba(255,0,0,0.5)

    placeholder_text = Enter password...
    placeholder_color = rgba(255,255,255,0.5)

    text_color = rgba(255,255,255,0.9)
    font_family = JetBrainsMono Nerd Font
    font_size = 18

    position = 0, -10
    halign = center
    valign = center
}
